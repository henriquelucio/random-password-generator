<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="password-container">
        <h1>Random Password Generator</h1>
        <div class="input-container">
            <input type="text" id="input" class="input" placeholder="Create Password" readonly>
            <i class="fa-regular fa-copy fa-2x"></i>
        </div>
        <button class="btn">Generate Password</button>
        <label for="num-length">Password size: <span id="slider-value"></span></label>
        <input class="input" type="number" id="num-length" min="6" max="64" value="" placeholder="14">
    </div>
    <div class="alert-container active"></div>
    <script src="index.js"></script>
</body>
</html>
